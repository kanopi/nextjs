name: 'NextJS for Drupal Starter'
description: 'A Next.js for Drupal site template. Applies the ui recipe (Canvas component library + home page + admin scaffolding) then layers in the decoupled bridge — next, jsonapi, decoupled_router, and the next_canvas custom module.'
type: Site

recipes:
  - ui
  - drupal_cms_authentication
  - drupal_cms_seo_basic
  - easy_email_express

install:
  - next
  - jsonapi
  - decoupled_router
  - subrequests
  - next_canvas

config:
  strict: false

  import:
    next: '*'

extra:
  recipe_installer_kit:
    finish_url: /admin/dashboard/welcome
  drupal_cms_installer:
    creator: 'Chapter Three'
    links:
      - text: Documentation
        url: 'https://next-drupal.org'
      - text: About Next.js
        url: 'https://nextjs.org'
      - text: Frontend repository
        url: 'https://github.com/chapter-three/next-drupal'
