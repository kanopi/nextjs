name: 'NextJS for Drupal'
description: 'Adds a decoupled Next.js bridge on top of the ui recipe (shadcn/ui Canvas Code Components). Installs the next module + JSON:API + decoupled_router + subrequests + the next_canvas REST endpoints, and ships a default Next.js site connection. Pairs with the kanopi/drupal-canvas-nextjs front end.'
type: Site

recipes:
  - ui

install:
  - next
  - jsonapi
  - decoupled_router
  - subrequests
  - next_canvas

config:
  strict: false

  import:
    next: '*'

extra:
  drupal_cms_installer:
    creator: 'Kanopi Studios'
    links:
      - text: Front-end repo (drupal-canvas-nextjs)
        url: 'https://github.com/kanopi/drupal-canvas-nextjs'
      - text: UI recipe (drupal/ui)
        url: 'https://www.drupal.org/project/ui'
      - text: About Drupal Canvas
        url: 'https://www.drupal.org/project/canvas'
      - text: About Next.js for Drupal
        url: 'https://next-drupal.org'
